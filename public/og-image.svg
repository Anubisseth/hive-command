<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1208" />
      <stop offset="55%" stop-color="#0e0a05" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <!-- Amber glow for the title -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Green accent glow -->
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Honeycomb cell -->
    <symbol id="hex" viewBox="0 0 100 86.6">
      <polygon points="50,0 100,25 100,75 50,100 0,75 0,25" fill="none" stroke-width="1.5" />
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Honeycomb pattern (decorative) -->
  <g opacity="0.18">
    <!-- Top-left cluster -->
    <use href="#hex" x="40"  y="40"  width="60" height="52" stroke="#FFB800" />
    <use href="#hex" x="92"  y="70"  width="60" height="52" stroke="#FFB800" />
    <use href="#hex" x="40"  y="100" width="60" height="52" stroke="#FFB800" />
    <use href="#hex" x="92"  y="130" width="60" height="52" stroke="#FFB800" />
    <use href="#hex" x="40"  y="160" width="60" height="52" stroke="#FFB800" />
    <use href="#hex" x="144" y="40"  width="60" height="52" stroke="#FFB800" />
    <use href="#hex" x="196" y="70"  width="60" height="52" stroke="#FFB800" />
    <!-- Top-right cluster -->
    <use href="#hex" x="980"  y="40"  width="60" height="52" stroke="#00FF88" opacity="0.7" />
    <use href="#hex" x="1032" y="70"  width="60" height="52" stroke="#00FF88" opacity="0.7" />
    <use href="#hex" x="1084" y="40"  width="60" height="52" stroke="#00FF88" opacity="0.7" />
    <use href="#hex" x="1032" y="130" width="60" height="52" stroke="#00FF88" opacity="0.5" />
    <use href="#hex" x="1084" y="100" width="60" height="52" stroke="#00FF88" opacity="0.5" />
    <!-- Bottom-left cluster -->
    <use href="#hex" x="60"   y="460" width="60" height="52" stroke="#00D4FF" opacity="0.6" />
    <use href="#hex" x="112"  y="490" width="60" height="52" stroke="#00D4FF" opacity="0.6" />
    <use href="#hex" x="60"   y="520" width="60" height="52" stroke="#00D4FF" opacity="0.6" />
    <!-- Bottom-right cluster -->
    <use href="#hex" x="1000" y="490" width="60" height="52" stroke="#FFB800" opacity="0.5" />
    <use href="#hex" x="1052" y="460" width="60" height="52" stroke="#FFB800" opacity="0.5" />
    <use href="#hex" x="1052" y="520" width="60" height="52" stroke="#FFB800" opacity="0.5" />
  </g>

  <!-- Grid lines (tactical hud) -->
  <g opacity="0.08" stroke="#FFB800" stroke-width="0.5">
    <line x1="0" y1="80"   x2="1200" y2="80" />
    <line x1="0" y1="550"  x2="1200" y2="550" />
    <line x1="80" y1="0"   x2="80"   y2="630" />
    <line x1="1120" y1="0" x2="1120" y2="630" />
  </g>

  <!-- Center hexagon emblem -->
  <g transform="translate(540, 165)">
    <polygon points="60,0 120,30 120,90 60,120 0,90 0,30"
             fill="rgba(255,184,0,0.08)"
             stroke="#FFB800"
             stroke-width="3"
             filter="url(#glow)" />
    <!-- Inner hex -->
    <polygon points="60,22 98,42 98,82 60,102 22,82 22,42"
             fill="none"
             stroke="#FFB800"
             stroke-width="1.5"
             opacity="0.5" />
    <!-- Crown icon (commander) -->
    <path d="M 35 70 L 45 50 L 55 65 L 65 45 L 75 65 L 85 50 L 95 70 L 35 70 Z"
          fill="#FFB800"
          opacity="0.9" />
    <circle cx="65" cy="40" r="3" fill="#FFB800" />
  </g>

  <!-- Title -->
  <text x="600" y="370"
        font-family="Orbitron, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="92"
        letter-spacing="14"
        fill="#FFB800"
        text-anchor="middle"
        filter="url(#glow)">HIVE COMMAND</text>

  <!-- Subtitle -->
  <text x="600" y="425"
        font-family="JetBrains Mono, monospace"
        font-weight="500"
        font-size="20"
        letter-spacing="8"
        fill="#9CA3AF"
        text-anchor="middle">AI AGENT SWARM OPERATIONS DASHBOARD</text>

  <!-- Status dots — like the real dashboard footer -->
  <g transform="translate(380, 520)">
    <circle cx="0"   cy="0" r="6"  fill="#00FF88" filter="url(#glow-green)" />
    <text x="14"  y="5" font-family="JetBrains Mono, monospace" font-size="14" fill="#9CA3AF" letter-spacing="2">22 AGENTS</text>

    <circle cx="160" cy="0" r="6"  fill="#FFB800" />
    <text x="174" y="5" font-family="JetBrains Mono, monospace" font-size="14" fill="#9CA3AF" letter-spacing="2">7 VENTURES</text>

    <circle cx="340" cy="0" r="6"  fill="#00D4FF" />
    <text x="354" y="5" font-family="JetBrains Mono, monospace" font-size="14" fill="#9CA3AF" letter-spacing="2">3D OFFICE</text>
  </g>

  <!-- Bottom tag -->
  <text x="600" y="595"
        font-family="JetBrains Mono, monospace"
        font-size="12"
        letter-spacing="4"
        fill="#6B7280"
        text-anchor="middle">SOLO OPERATOR · 4-TIER HIERARCHY · AIRTABLE-BACKED · OPEN SOURCE</text>
</svg>
